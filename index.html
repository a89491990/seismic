<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Future Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hero">

  <h1 class="main-title">
    FUTURE <span>QUIZ</span>
  </h1>

  <p class="tagline">
    Experience the next generation of interactive quizzes
  </p>

  <button class="start-btn" onclick="startQuiz()">
    Start Experience →
  </button>

</div>

<script>
function startQuiz() {
  document.body.classList.add("fade-out");
  setTimeout(() => {
    window.location.href = "quiz.html";
  }, 600);
}
</script>

</body>
</html>
