<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Futuristic Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- Progress -->
  <div class="progress-bar">
    <div id="progress"></div>
  </div>

  <!-- Timer -->
  <div class="timer" id="time">10</div>

  <!-- Quiz Box -->
  <div class="quiz-box fade">
    <h2 id="question"></h2>
    <div id="options"></div>
    <button id="nextBtn">Next</button>
  </div>

  <!-- Result -->
  <div id="result" class="hidden">
    <h1>Your Score</h1>
    <h2 id="score">0</h2>
    <button onclick="location.reload()">Restart</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
