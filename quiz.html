<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <p id="qNumber"></p>

  <div class="progress-bar">
    <div id="progress"></div>
  </div>

  <div class="timer" id="time">10</div>

  <div class="quiz-box">
    <h2 id="question"></h2>
    <div id="options"></div>
  </div>

  <div id="result" class="hidden result-box">
    <h1 class="result-title">Quiz Completed 🎉</h1>

    <div class="score-circle">
      <span id="score">0</span>
    </div>

    <p id="gradeText"></p>

    <button onclick="location.reload()" class="restart-btn">
      Restart Quiz
    </button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
